<div class="container min-vh-100 d-flex justify-content-center align-items-center text-center" style="background-image: url('https://static.vecteezy.com/system/resources/thumbnails/033/027/755/small_2x/flat-lay-vegetables-on-white-background-food-and-diet-concept-ai-generated-free-photo.jpg'); background-size: cover;
            background-position: center;
            background-repeat: no-repeat;">
   <div class="d-flex flex-column">
        <h4>Login</h4>
    <p>More than 100 plus Recipes from around the world</p>
        <form [formGroup]="loginForm" (ngSubmit)="login()" class="border shadow p-5 rounded d-flex flex-column gap-2 justify-content-center align-items-center me-5">
            <div class="fw-bold fs-5"><i class="fa-solid fa-graduation-cap"></i> Cookpedia</div>
            <input name="email" formControlName="email" type="email" placeholder="E Mail" class="form-control">
             @if (loginForm.get('email')?.errors && loginForm.get('email')?.touched){
                <div class="mb-3 text-danger fw-bolder">*Invalid Email</div>
            }
            <input name="password" formControlName="password" type="password" placeholder="Password" class="form-control">
            @if (loginForm.get('password')?.errors && loginForm.get('password')?.touched){
                <div class="mb-3 text-danger fw-bolder">*Invalid Password</div>
            }
            <button type="submit" class="btn btn-success w-100">Login</button>
        </form>
       
    
   </div>

</div>
<app-footer></app-footer>
