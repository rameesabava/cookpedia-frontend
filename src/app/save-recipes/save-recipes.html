<app-header></app-header>
<div class="container my-5">
    <h1 class="text-center">Recipe Collection</h1>
    <div class="row my-5">
        @for (recipe of allRecipes(); track $index){
            <div class="col-lg-3">
            <div class="p-3">
                <img routerLink="/recipes/{{recipe.recipeId}}" class="card-img-top img-fluid" [src]="recipe.image" alt="recipe">
                <div class="card-body d-flex align-items-center justify-content-between">
                    <h5 class="card-title">{{recipe.name}}</h5>
                    <button (click)="deleteRecipe(recipe._id)" class="btn text-danger"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        </div>
        }
    </div>
</div>
<app-footer></app-footer>
